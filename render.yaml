services:
  - type: web
    name: ashnoor-portfolio
    env: node
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: NPM_CONFIG_PRODUCTION
        value: "false"

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free
