services:
  - type: web
    name: ashnoor-portfolio
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
    autoDeploy: true
    healthCheckPath: /

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free