services:
  - type: web
    name: ashnoor-portfolio
    env: node
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    postDeployCommand: npm run db:push
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: internalConnectionString

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free
